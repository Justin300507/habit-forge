databases:
  - name: habit-forge-db
    databaseName: habit_forge_db
    plan: free

services:
  - type: web
    name: habit-forge-backend
    runtime: python
    plan: free
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habit-forge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: habit-forge-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
